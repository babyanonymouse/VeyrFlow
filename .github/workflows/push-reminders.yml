name: Dispatch Push Reminders

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Push Reminders Cron
        run: |
          curl -s -X GET "https://[YOUR-PRODUCTION-URL]/api/cron/reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail
