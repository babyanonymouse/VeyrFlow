<!DOCTYPE html>

<head>

  <title>VeyrFlow Icon</title>

    width="192"
    height="192"
    viewBox="0 0 100 100"
    fill="none"
    aria-label="VeyrFlow icon"
    role="img"
  >

      <linearGradient id="veyrflow-gradient" x1="20" y1="80" x2="80" y2="20" gradientUnits="userSpaceOnUse">

    <path
      d="M20 35 L45 80 L80 25"

    />

    <path
      d="M55 25 L80 25 L80 50"
      stroke="url(#veyrflow-gradient)"
      stroke-width="10"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <circle cx="32.5" cy="57.5" r="6" fill="#09090b" stroke="url(#veyrflow-gradient)" stroke-width="3" />
    <circle cx="62.5" cy="50" r="6" fill="#09090b" stroke="url(#veyrflow-gradient)" stroke-width="3" />
